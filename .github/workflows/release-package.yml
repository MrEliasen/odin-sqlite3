name: release-package

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libclang-dev llvm-dev clang curl unzip zip git make

      - name: Setup Odin
        uses: laytan/setup-odin@v2.12.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      - name: Set Linux LLVM/libclang environment
        run: |
          echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/llvm-14/lib" >> "$GITHUB_ENV"
          echo 'ODIN_EXTRA_LINKER_FLAGS=-L/usr/lib/llvm-14/lib -lclang' >> "$GITHUB_ENV"

      - name: Build bindgen and package release asset
        env:
          ODIN_EXTRA_LINKER_FLAGS: ${{ env.ODIN_EXTRA_LINKER_FLAGS }}
        run: |
          make download-sqlite
          make bindgen
          make regenerate
          make package-zip
          mv out/odin-sqlite-package.zip out/odin-sqlite-package-linux-x86_64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: odin-sqlite-package-linux-x86_64
          path: out/odin-sqlite-package-linux-x86_64.zip
          retention-days: 14

  package-macos:
    name: Package macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OS dependencies
        run: |
          brew install llvm make

      - name: Setup Odin
        uses: laytan/setup-odin@v2.12.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      - name: Build bindgen and package release asset
        env:
          PATH: /opt/homebrew/opt/make/libexec/gnubin:/usr/local/opt/make/libexec/gnubin:/opt/homebrew/opt/llvm/bin:/usr/local/opt/llvm/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin
          LIBCLANG_PATH: /opt/homebrew/opt/llvm/lib:/usr/local/opt/llvm/lib
        run: |
          make download-sqlite
          make bindgen
          make regenerate
          make package-zip
          mv out/odin-sqlite-package.zip out/odin-sqlite-package-macos-arm64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: odin-sqlite-package-macos-arm64
          path: out/odin-sqlite-package-macos-arm64.zip
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-macos
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: odin-sqlite-package-linux-x86_64
          path: out

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: odin-sqlite-package-macos-arm64
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/odin-sqlite-package-linux-x86_64.zip
            out/odin-sqlite-package-macos-arm64.zip
          generate_release_notes: true

      - name: Move latest tag to this release commit
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force