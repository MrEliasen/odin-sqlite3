name: release-package

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  ODIN_VERSION: dev-2026-05

jobs:
  qualification:
    name: Required qualification
    uses: ./.github/workflows/ci.yml

  package-linux:
    name: Package Linux
    needs: qualification
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libclang-dev llvm-dev clang curl unzip zip git make

      - name: Setup Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Build bindgen and package release asset
        run: |
          make download-sqlite
          make bindgen
          make regenerate
          make package-zip
          mv out/odin-sqlite-package.zip out/odin-sqlite-package-linux-x86_64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: odin-sqlite-package-linux-x86_64
          path: out/odin-sqlite-package-linux-x86_64.zip
          retention-days: 14

  package-macos:
    name: Package macOS
    needs: qualification
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install OS dependencies
        run: |
          brew install llvm make

      - name: Setup Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Configure Homebrew tool paths
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Build bindgen and package release asset
        run: |
          make download-sqlite
          make bindgen
          make regenerate
          make package-zip
          mv out/odin-sqlite-package.zip out/odin-sqlite-package-macos-arm64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: odin-sqlite-package-macos-arm64
          path: out/odin-sqlite-package-macos-arm64.zip
          retention-days: 14

  package-windows:
    name: Package Windows
    needs: qualification
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Install pinned GNU Make
        shell: pwsh
        run: choco install make --version=4.4.1 --yes --no-progress

      - name: Download qualified raw bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sqlite-raw-generated
          path: sqlite/raw/generated

      - name: Build and check Windows package
        shell: bash
        run: make SHELL=bash package-check

      - name: Create Windows release asset
        shell: pwsh
        run: |
          Compress-Archive `
            -Path out/odin-sqlite-package `
            -DestinationPath out/odin-sqlite-package-windows-x86_64.zip `
            -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6fb58ed0dc250532a479d7789f # v6
        with:
          name: odin-sqlite-package-windows-x86_64
          path: out/odin-sqlite-package-windows-x86_64.zip
          retention-days: 14

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs:
      - package-linux
      - package-macos
      - package-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: odin-sqlite-package-linux-x86_64
          path: out

      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: odin-sqlite-package-macos-arm64
          path: out

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: odin-sqlite-package-windows-x86_64
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            out/odin-sqlite-package-linux-x86_64.zip
            out/odin-sqlite-package-macos-arm64.zip
            out/odin-sqlite-package-windows-x86_64.zip
          generate_release_notes: true

      - name: Move latest tag to this release commit
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force
