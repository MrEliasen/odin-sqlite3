name: qualification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  ODIN_VERSION: dev-2026-05

jobs:
  source-and-cross:
    name: Generated source, ABI, and compile-only matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install generation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libclang-dev llvm-dev clang git make

      - name: Setup pinned Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Report toolchain
        run: |
          odin version
          clang --version
          python3 --version

      - name: Prove orchestration is fail-fast
        run: make test-orchestration

      - name: Regenerate raw bindings from pinned inputs
        run: make regenerate

      - name: Verify raw ABI and API inventory
        run: make verify-raw-abi

      - name: Compile-only target and feature matrix
        run: make cross-check

      - name: Upload generated raw bindings
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sqlite-raw-generated
          path: sqlite/raw/generated/
          if-no-files-found: error
          retention-days: 1

  native-runtime:
    name: Native runtime and optional symbol reference probe (${{ matrix.os }})
    needs: source-and-cross
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-24.04
          - os: macos-arm64
            runner: macos-14
          - os: windows-x64
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pinned Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Setup MSVC x64
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Download generated raw bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sqlite-raw-generated
          path: sqlite/raw/generated

      - name: Build pinned all-feature SQLite (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: python3 ci/build_sqlite.py --output out/ci-sqlite

      - name: Build pinned all-feature SQLite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python ci/build_sqlite.py --output out/ci-sqlite

      - name: Run complete native suite and all examples (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >-
          python3 ci/qualify.py native
          --sqlite-library "$PWD/out/ci-sqlite/libsqlite3.a"
          --feature-profile default

      - name: Run complete native suite and all examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          python ci/qualify.py native
          --sqlite-library "$PWD/out/ci-sqlite/sqlite3.lib"
          --feature-profile default

      - name: Run all-81-symbol link-and-load reference probe (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >-
          python3 packaging/apply_postgen_patches.py
          --verify-optional-link "$PWD/out/ci-sqlite/libsqlite3.a"
          --feature-profile all

      - name: Run all-81-symbol link-and-load reference probe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          python packaging/apply_postgen_patches.py
          --verify-optional-link "$PWD/out/ci-sqlite/sqlite3.lib"
          --feature-profile all

  address-sanitizer:
    name: Native AddressSanitizer (${{ matrix.os }})
    needs: source-and-cross
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: ubuntu-24.04
          - os: macos-arm64
            runner: macos-14
          - os: windows-x64
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pinned Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ github.token }}
          release: ${{ env.ODIN_VERSION }}

      - name: Install matching macOS sanitizer linker
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install Linux sanitizer linker
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Setup MSVC x64
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Download generated raw bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sqlite-raw-generated
          path: sqlite/raw/generated

      - name: Build pinned SQLite for sanitizer run (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: python3 ci/build_sqlite.py --output out/ci-sqlite

      - name: Build pinned SQLite for sanitizer run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python ci/build_sqlite.py --output out/ci-sqlite

      - name: Run complete suite and examples under ASan (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: >-
          python3 ci/qualify.py sanitize
          --sqlite-library "$PWD/out/ci-sqlite/libsqlite3.a"
          --feature-profile default

      - name: Run complete suite and examples under ASan (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          python ci/qualify.py sanitize
          --sqlite-library "$PWD/out/ci-sqlite/sqlite3.lib"
          --feature-profile default
